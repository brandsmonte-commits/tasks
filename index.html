<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои задачи</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;--bg2:#171717;--bg3:#1f1f1f;--bg4:#2a2a2a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --accent:#7c6fff;--accent2:#5b52cc;
  --high:#ff5f5f;--high-bg:rgba(255,95,95,0.12);
  --mid:#f5a623;--mid-bg:rgba(245,166,35,0.12);
  --low:#4caf7d;--low-bg:rgba(76,175,125,0.12);
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:20;}
.logo{font-size:14px;font-weight:600;letter-spacing:-0.3px;}.logo span{color:var(--accent);}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.bc-link{cursor:pointer;transition:color .15s;}.bc-link:hover{color:var(--text);}
.bc-sep{color:var(--text3);}
.bc-cur{color:var(--text);display:flex;align-items:center;gap:6px;}
.screen{display:none;}.screen.active{display:block;}
.btn{font-family:'Geist',sans-serif;font-size:12px;font-weight:500;border-radius:var(--r);cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;padding:7px 13px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:rgba(255,95,95,0.15);color:var(--high);border:1px solid rgba(255,95,95,0.3);}.btn-danger:hover{background:rgba(255,95,95,0.25);}
.btn-icon{padding:5px;background:transparent;color:var(--text3);border:none;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;transition:all .15s;font-family:'Geist',sans-serif;}
.btn-icon:hover{background:var(--bg4);color:var(--text2);}
.page{padding:24px 20px;max-width:960px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:18px;font-weight:600;letter-spacing:-0.4px;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;cursor:pointer;position:relative;transition:all .15s;}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);}
.proj-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:12px;}
.proj-name{font-size:14px;font-weight:500;margin-bottom:5px;letter-spacing:-0.2px;}
.proj-meta{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;}
.proj-del{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .15s;}
.proj-card:hover .proj-del{opacity:1;}
.add-proj-card{background:transparent;border:1px dashed var(--border2);border-radius:var(--rl);padding:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--text3);font-family:'Geist',sans-serif;transition:all .15s;}
.add-proj-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,0.05);}
.board-nav{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.nav-tab{font-family:'Geist',sans-serif;font-size:12px;font-weight:500;background:transparent;border:1px solid transparent;border-radius:var(--r);cursor:pointer;color:var(--text3);padding:6px 12px;transition:all .15s;}
.nav-tab:hover{color:var(--text2);}
.nav-tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text);}
.filter-bar{display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;color:var(--text3);margin-right:2px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.filter-btn{font-family:'Geist',sans-serif;font-size:11px;font-weight:500;border-radius:99px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);padding:4px 10px;transition:all .15s;}
.filter-btn.active{background:var(--bg4);color:var(--text);}
.filter-btn.f-high.active{background:var(--high-bg);color:var(--high);border-color:var(--high);}
.filter-btn.f-mid.active{background:var(--mid-bg);color:var(--mid);border-color:var(--mid);}
.filter-btn.f-low.active{background:var(--low-bg);color:var(--low);border-color:var(--low);}
.board-wrap{padding:16px 20px;overflow-x:auto;}
.board{display:flex;gap:10px;min-height:500px;align-items:flex-start;}

/* COLUMN — draggable */
.column{flex:0 0 220px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);display:flex;flex-direction:column;transition:opacity .15s;}
.column.col-dragging{opacity:.35;}
.column.col-drag-over{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.col-header{padding:11px 12px 9px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.col-drag-handle{cursor:grab;color:var(--text3);font-size:12px;padding:2px 3px;border-radius:4px;line-height:1;user-select:none;flex-shrink:0;}
.col-drag-handle:hover{color:var(--text2);background:var(--bg4);}
.col-drag-handle:active{cursor:grabbing;}
.col-title-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
.col-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;width:100%;outline:none;cursor:text;background:transparent;border:none;color:var(--text2);font-family:'Geist Mono',monospace;}
.col-title:focus{color:var(--text);}
.col-count{font-size:10px;background:var(--bg4);border-radius:99px;padding:2px 7px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;}
.col-del-btn{opacity:0;transition:opacity .15s;flex-shrink:0;}
.column:hover .col-del-btn{opacity:1;}
.cards{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:40px;}
.column.card-drag-over{border-color:var(--accent);background:rgba(124,111,255,0.04);}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card.dragging{opacity:.35;}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px;letter-spacing:-.2px;}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:6px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;font-family:'Geist Mono',monospace;white-space:nowrap;}
.b-high{background:var(--high-bg);color:var(--high);}
.b-mid{background:var(--mid-bg);color:var(--mid);}
.b-low{background:var(--low-bg);color:var(--low);}
.deadline-badge{font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;}
.deadline-badge.overdue{color:var(--high);}
.deadline-badge.soon{color:var(--mid);}
.col-footer{padding:7px 8px;border-top:1px solid var(--border);}
.btn-add-card{width:100%;background:none;border:1px dashed transparent;border-radius:var(--r);padding:6px;font-size:11px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Geist',sans-serif;transition:all .15s;}
.btn-add-card:hover{border-color:var(--border2);color:var(--text2);}
.add-col-btn{flex:0 0 auto;background:transparent;border:1px dashed var(--border2);border-radius:var(--rl);padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-family:'Geist',sans-serif;transition:all .15s;white-space:nowrap;align-self:flex-start;}
.add-col-btn:hover{border-color:var(--accent);color:var(--accent);}
.empty-col{text-align:center;padding:20px 10px;color:var(--text3);font-size:11px;line-height:1.6;}
.cal-wrap{padding:16px 20px;max-width:860px;}
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cal-month{font-size:16px;font-weight:600;letter-spacing:-.3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.cal-dow{background:var(--bg2);padding:8px;text-align:center;font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.cal-day{background:var(--bg2);min-height:88px;padding:7px;vertical-align:top;}
.cal-day.other-month{background:var(--bg);}
.cal-day.today{background:rgba(124,111,255,0.07);}
.cal-day-num{font-size:12px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:600;}
.cal-task{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s;}
.cal-task:hover{opacity:.75;}
.cal-task.p-high{background:var(--high-bg);color:var(--high);}
.cal-task.p-mid{background:var(--mid-bg);color:var(--mid);}
.cal-task.p-low{background:var(--low-bg);color:var(--low);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:22px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.3px;}
.modal label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.modal input,.modal textarea,.modal select{width:100%;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Geist',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{resize:vertical;min-height:72px;}
.modal select option{background:var(--bg3);}
.modal-btns{display:flex;gap:8px;justify-content:space-between;margin-top:4px;align-items:center;}
.color-row{display:flex;gap:8px;margin-bottom:14px;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot.selected{border-color:#fff;transform:scale(1.15);}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">tasks<span>.</span></div>
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<div id="screen-projects" class="screen active">
  <div class="page">
    <div class="page-header">
      <div class="page-title">Проекты</div>
      <button class="btn btn-primary" onclick="openProjModal()">+ Новый проект</button>
    </div>
    <div id="proj-grid" class="proj-grid">
      <div class="loading"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>
</div>

<div id="screen-board" class="screen">
  <div class="board-nav">
    <button class="nav-tab active" id="tab-board" onclick="switchView('board')">Доска</button>
    <button class="nav-tab" id="tab-calendar" onclick="switchView('calendar')">Календарь</button>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-ghost" onclick="openColModal()" style="font-size:11px;">+ Статус</button>
      <button class="btn btn-primary" onclick="openCardModal(null)">+ Задача</button>
    </div>
  </div>
  <div id="view-board">
    <div class="filter-bar">
      <span class="filter-label">Приоритет</span>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
      <button class="filter-btn f-high" data-filter="high" onclick="setFilter('high')">Высокий</button>
      <button class="filter-btn f-mid" data-filter="mid" onclick="setFilter('mid')">Средний</button>
      <button class="filter-btn f-low" data-filter="low" onclick="setFilter('low')">Низкий</button>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
  </div>
  <div id="view-calendar" style="display:none;">
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="btn-icon" onclick="calNav(-1)">&#8592;</button>
        <div class="cal-month" id="cal-month"></div>
        <button class="btn-icon" onclick="calNav(1)">&#8594;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <div id="modal-left-btn"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="saveModal()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://myjsbrroypvagudhhgdq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15anNicnJveXB2YWd1ZGhoZ2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTM3ODgsImV4cCI6MjA5Mzk2OTc4OH0.alpw_L3ufwltG2ixvj3wQlk83-eYGlACxpzTQ8sFARI';
const COLORS=['#7c6fff','#4caf7d','#ff5f5f','#f5a623','#4db8ff','#c084fc'];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

let projects=[],cards=[],columns=[];
let currentProj=null,currentFilter='all',currentView='board';
let calDate=new Date();
let dragCardId=null,dragColId=null;
let modalMode=null,editingId=null,selectedColor=COLORS[0],targetCol=null;

async function api(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  const text=await r.text();
  return text?JSON.parse(text):null;
}

async function loadProjects(){
  projects=await api('projects?select=*&order=created_at.asc')||[];
  renderProjects();
}

async function loadProject(projId){
  [cards,columns]=await Promise.all([
    api('cards?select=*&proj_id=eq.'+projId+'&order=created_at.asc'),
    api('columns?select=*&proj_id=eq.'+projId+'&order=position.asc')
  ]);
  cards=cards||[];columns=columns||[];
  if(!columns.length)await initDefaultColumns(projId);
}

async function initDefaultColumns(projId){
  const defs=['Бэклог','В работе','Ревью','Готово'];
  for(let i=0;i<defs.length;i++){
    const res=await api('columns','POST',{proj_id:projId,title:defs[i],position:i});
    columns.push(res[0]);
  }
}

function renderProjects(){
  const grid=document.getElementById('proj-grid');
  grid.innerHTML='';
  document.getElementById('breadcrumb').innerHTML='';
  projects.forEach(p=>{
    const el=document.createElement('div');
    el.className='proj-card';
    el.innerHTML=`<div class="proj-dot" style="background:${p.color}"></div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-meta" id="pmeta-${p.id}">загрузка...</div>
      <button class="btn-icon proj-del" onclick="event.stopPropagation();delProject('${p.id}')" title="Удалить">&#x2715;</button>`;
    el.addEventListener('click',()=>openProject(p.id,p.name,p.color));
    grid.appendChild(el);
    loadMeta(p.id);
  });
  const add=document.createElement('button');
  add.className='add-proj-card';add.innerHTML='+ Новый проект';
  add.onclick=openProjModal;grid.appendChild(add);
}

async function loadMeta(projId){
  try{
    const c=await api('cards?select=id,col&proj_id=eq.'+projId)||[];
    const cols=await api('columns?select=id&proj_id=eq.'+projId+'&order=position.desc&limit=1')||[];
    const lastCol=cols[0]?.id;
    const done=lastCol?c.filter(x=>x.col===lastCol).length:0;
    const el=document.getElementById('pmeta-'+projId);
    if(el)el.textContent=c.length+' задач · '+done+' готово';
  }catch(e){}
}

async function openProject(projId,name,color){
  currentProj=projId;currentFilter='all';currentView='board';
  document.getElementById('screen-projects').classList.remove('active');
  document.getElementById('screen-board').classList.add('active');
  document.getElementById('breadcrumb').innerHTML=
    `<span class="bc-link" onclick="showProjects()">Проекты</span>
     <span class="bc-sep">/</span>
     <span class="bc-cur"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block"></span>${name}</span>`;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('tab-board').classList.add('active');
  document.getElementById('tab-calendar').classList.remove('active');
  document.getElementById('view-board').style.display='block';
  document.getElementById('view-calendar').style.display='none';
  document.getElementById('board').innerHTML='<div class="loading"><div class="spinner"></div> Загрузка...</div>';
  await loadProject(projId);
  renderBoard();
}

function showProjects(){
  currentProj=null;
  document.getElementById('screen-board').classList.remove('active');
  document.getElementById('screen-projects').classList.add('active');
  loadProjects();
}

function switchView(v){
  currentView=v;
  document.getElementById('view-board').style.display=v==='board'?'block':'none';
  document.getElementById('view-calendar').style.display=v==='calendar'?'block':'none';
  document.getElementById('tab-board').classList.toggle('active',v==='board');
  document.getElementById('tab-calendar').classList.toggle('active',v==='calendar');
  if(v==='calendar')renderCalendar();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="'+f+'"]').classList.add('active');
  renderBoard();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const filtered=currentFilter==='all'?cards:cards.filter(c=>c.priority===currentFilter);

  columns.forEach(col=>{
    const colCards=filtered.filter(c=>c.col===col.id);
    const allCount=cards.filter(c=>c.col===col.id).length;
    const el=document.createElement('div');
    el.className='column';
    el.dataset.colId=col.id;

    el.innerHTML=`
      <div class="col-header">
        <span class="col-drag-handle" title="Перетащить колонку">&#8942;&#8942;</span>
        <div class="col-title-wrap">
          <input class="col-title" value="${col.title}"
            onblur="renameCol('${col.id}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()" />
          <span class="col-count">${colCards.length}${currentFilter!=='all'?'/'+allCount:''}</span>
        </div>
        <button class="btn-icon col-del-btn" onclick="delCol('${col.id}')" title="Удалить">&#x2715;</button>
      </div>
      <div class="cards" id="col-${col.id}">
        ${colCards.length===0?'<div class="empty-col">Нет задач</div>':colCards.map(cardHTML).join('')}
      </div>
      <div class="col-footer">
        <button class="btn-add-card" onclick="openCardModal('${col.id}')">+ Добавить</button>
      </div>`;

    // Card drag-over (for moving cards between columns)
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragCardId) el.classList.add('card-drag-over');
      if(dragColId && dragColId!==col.id) el.classList.add('col-drag-over');
    });
    el.addEventListener('dragleave',()=>{
      el.classList.remove('card-drag-over');
      el.classList.remove('col-drag-over');
    });
    el.addEventListener('drop',e=>{
      e.preventDefault();
      el.classList.remove('card-drag-over');
      el.classList.remove('col-drag-over');
      if(dragCardId) dropCard(col.id);
      if(dragColId && dragColId!==col.id) dropColumn(col.id);
    });

    // Column drag (handle only)
    const handle=el.querySelector('.col-drag-handle');
    handle.addEventListener('mousedown',()=>{ el.setAttribute('draggable','true'); });
    el.addEventListener('dragstart',e=>{
      if(!el.getAttribute('draggable')||el.getAttribute('draggable')==='false') { e.preventDefault(); return; }
      dragColId=col.id; dragCardId=null;
      setTimeout(()=>el.classList.add('col-dragging'),0);
    });
    el.addEventListener('dragend',()=>{
      el.setAttribute('draggable','false');
      el.classList.remove('col-dragging');
      dragColId=null;
    });

    board.appendChild(el);
  });

  // Card drag listeners
  board.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      e.stopPropagation();
      dragCardId=card.dataset.id; dragColId=null;
      setTimeout(()=>card.classList.add('dragging'),0);
    });
    card.addEventListener('dragend',()=>{ card.classList.remove('dragging'); dragCardId=null; });
    card.addEventListener('click',()=>openEditCardModal(card.dataset.id));
  });

  const addBtn=document.createElement('button');
  addBtn.className='add-col-btn';addBtn.innerHTML='+ Добавить статус';
  addBtn.onclick=openColModal;board.appendChild(addBtn);
}

async function dropCard(colId){
  if(!dragCardId)return;
  const card=cards.find(c=>c.id===dragCardId);
  if(card&&card.col!==colId){
    card.col=colId;renderBoard();
    await api('cards?id=eq.'+dragCardId,'PATCH',{col:colId});
  }
  dragCardId=null;
}

async function dropColumn(targetColId){
  if(!dragColId||dragColId===targetColId)return;
  const fromIdx=columns.findIndex(c=>c.id===dragColId);
  const toIdx=columns.findIndex(c=>c.id===targetColId);
  if(fromIdx===-1||toIdx===-1)return;

  // Reorder locally
  const moved=columns.splice(fromIdx,1)[0];
  columns.splice(toIdx,0,moved);

  // Update positions
  columns.forEach((c,i)=>c.position=i);
  renderBoard();

  // Persist all positions
  await Promise.all(columns.map((c,i)=>api('columns?id=eq.'+c.id,'PATCH',{position:i})));
  dragColId=null;
}

async function renameCol(colId,newTitle){
  if(!newTitle.trim())return;
  const col=columns.find(c=>c.id===colId);
  if(!col||col.title===newTitle.trim())return;
  col.title=newTitle.trim();
  await api('columns?id=eq.'+colId,'PATCH',{title:col.title});
}

async function delCol(colId){
  if(!confirm('Удалить статус? Задачи в нём тоже удалятся.'))return;
  columns=columns.filter(c=>c.id!==colId);
  cards=cards.filter(c=>c.col!==colId);
  renderBoard();
  await api('columns?id=eq.'+colId,'DELETE');
}

async function delCard(id){
  cards=cards.filter(c=>c.id!==id);
  renderBoard();closeModal();
  await api('cards?id=eq.'+id,'DELETE');
}

async function delProject(id){
  if(!confirm('Удалить проект и все задачи?'))return;
  projects=projects.filter(p=>p.id!==id);
  renderProjects();
  await api('projects?id=eq.'+id,'DELETE');
}

function deadlineClass(dl){
  if(!dl)return'';
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.floor((new Date(dl)-today)/864e5);
  if(diff<0)return'overdue';if(diff<=3)return'soon';return'';
}
function fmtDate(dl){
  if(!dl)return'';
  const[y,m,d]=dl.split('-');
  return d+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][parseInt(m)-1];
}
function cardHTML(c){
  const bc=c.priority==='high'?'b-high':c.priority==='mid'?'b-mid':'b-low';
  const bl=c.priority==='high'?'Высокий':c.priority==='mid'?'Средний':'Низкий';
  const dc=c.deadline?deadlineClass(c.deadline):'';
  const dlHTML=c.deadline?`<span class="deadline-badge ${dc}">${fmtDate(c.deadline)}</span>`:'';
  return`<div class="card" draggable="true" data-id="${c.id}">
    <div class="card-title">${c.title}</div>
    ${c.description?`<div class="card-desc">${c.description}</div>`:''}
    <div class="card-footer"><span class="badge ${bc}">${bl}</span>${dlHTML}</div>
  </div>`;
}

function openProjModal(){
  modalMode='project';editingId=null;selectedColor=COLORS[0];
  document.getElementById('modal-title').textContent='Новый проект';
  document.getElementById('modal-body').innerHTML=`
    <label>Название</label>
    <input id="inp-pname" type="text" placeholder="Название проекта" />
    <label>Цвет</label>
    <div class="color-row">${COLORS.map((c,i)=>`<div class="color-dot${i===0?' selected':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`).join('')}</div>`;
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-pname').focus(),60);
}

function openColModal(){
  modalMode='col';
  document.getElementById('modal-title').textContent='Новый статус';
  document.getElementById('modal-body').innerHTML=`
    <label>Название статуса</label>
    <input id="inp-colname" type="text" placeholder="Например: Тестирование" />`;
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-colname').focus(),60);
}

function openCardModal(colId){
  modalMode='card';editingId=null;
  targetCol=colId||(columns[0]?.id);
  document.getElementById('modal-title').textContent='Новая задача';
  document.getElementById('modal-body').innerHTML=cardFormHTML(null);
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-ctitle').focus(),60);
}

function openEditCardModal(cardId){
  const c=cards.find(x=>x.id===cardId);if(!c)return;
  modalMode='card';editingId=cardId;targetCol=c.col;
  document.getElementById('modal-title').textContent='Редактировать задачу';
  document.getElementById('modal-body').innerHTML=cardFormHTML(c);
  document.getElementById('modal-left-btn').innerHTML=
    `<button class="btn btn-danger" onclick="delCard('${cardId}')">Удалить</button>`;
  openModal();setTimeout(()=>document.getElementById('inp-ctitle').focus(),60);
}

function cardFormHTML(c){
  const colOpts=columns.map(col=>`<option value="${col.id}"${(c?c.col:targetCol)===col.id?' selected':''}>${col.title}</option>`).join('');
  return`
    <label>Заголовок</label>
    <input id="inp-ctitle" type="text" placeholder="Что нужно сделать?" value="${c?c.title:''}" />
    <label>Описание</label>
    <textarea id="inp-cdesc" placeholder="Необязательно...">${c?c.description||'':''}</textarea>
    <label>Приоритет</label>
    <select id="inp-cpri">
      <option value="low"${c?.priority==='low'?' selected':''}>Низкий</option>
      <option value="mid"${(!c||c.priority==='mid')?' selected':''}>Средний</option>
      <option value="high"${c?.priority==='high'?' selected':''}>Высокий</option>
    </select>
    <label>Статус</label>
    <select id="inp-ccol">${colOpts}</select>
    <label>Дедлайн</label>
    <input id="inp-deadline" type="date" value="${c?.deadline||''}" />`;
}

function selColor(c,el){
  selectedColor=c;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
}
function openModal(){document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

async function saveModal(){
  if(modalMode==='project'){
    const name=document.getElementById('inp-pname').value.trim();
    if(!name)return;
    const res=await api('projects','POST',{name,color:selectedColor});
    projects.push(res[0]);renderProjects();closeModal();
  }else if(modalMode==='col'){
    const title=document.getElementById('inp-colname').value.trim();
    if(!title)return;
    const res=await api('columns','POST',{proj_id:currentProj,title,position:columns.length});
    columns.push(res[0]);renderBoard();closeModal();
  }else{
    const title=document.getElementById('inp-ctitle').value.trim();
    if(!title)return;
    const body={proj_id:currentProj,title,
      description:document.getElementById('inp-cdesc').value.trim(),
      priority:document.getElementById('inp-cpri').value,
      col:document.getElementById('inp-ccol').value,
      deadline:document.getElementById('inp-deadline').value||null};
    if(editingId){
      await api('cards?id=eq.'+editingId,'PATCH',body);
      const idx=cards.findIndex(c=>c.id===editingId);
      if(idx>-1)cards[idx]={...cards[idx],...body};
    }else{
      const res=await api('cards','POST',body);cards.push(res[0]);
    }
    renderBoard();
    if(currentView==='calendar')renderCalendar();
    closeModal();
  }
}

function calNav(dir){calDate.setMonth(calDate.getMonth()+dir);renderCalendar();}
function renderCalendar(){
  const year=calDate.getFullYear(),month=calDate.getMonth();
  document.getElementById('cal-month').textContent=MONTHS[month]+' '+year;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  DAYS.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(year,month,1);
  let startDow=first.getDay()-1;if(startDow<0)startDow=6;
  const dim=new Date(year,month+1,0).getDate();
  const dip=new Date(year,month,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const rows=Math.ceil((startDow+dim)/7)*7;
  for(let i=0;i<rows;i++){
    const el=document.createElement('div');el.className='cal-day';
    let dn,isCur=true;
    if(i<startDow){dn=dip-startDow+i+1;isCur=false;}
    else if(i>=startDow+dim){dn=i-startDow-dim+1;isCur=false;}
    else{dn=i-startDow+1;}
    if(!isCur)el.classList.add('other-month');
    const td=new Date(year,isCur?month:(i<startDow?month-1:month+1),dn);
    if(td.getTime()===today.getTime())el.classList.add('today');
    el.innerHTML=`<div class="cal-day-num">${dn}</div>`;
    if(isCur){
      const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
      cards.filter(c=>c.deadline===ds).forEach(c=>{
        const t=document.createElement('div');
        t.className='cal-task p-'+c.priority;t.textContent=c.title;t.title=c.title;
        t.onclick=()=>openEditCardModal(c.id);el.appendChild(t);
      });
    }
    grid.appendChild(el);
  }
}

document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
loadProjects();
</script>
