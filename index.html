<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои задачи</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;--bg2:#171717;--bg3:#1f1f1f;--bg4:#2a2a2a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --accent:#7c6fff;--accent2:#5b52cc;
  --high:#ff5f5f;--high-bg:rgba(255,95,95,0.12);
  --mid:#f5a623;--mid-bg:rgba(245,166,35,0.12);
  --low:#4caf7d;--low-bg:rgba(76,175,125,0.12);
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* SIDEBAR */

/* LOCK SCREEN */
.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.lock-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:32px;width:320px;text-align:center;}
.lock-logo{font-size:20px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;}
.lock-logo span{color:var(--accent);}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.lock-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Geist',sans-serif;font-size:14px;padding:10px 12px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:10px;}
.lock-input:focus{border-color:var(--accent);}
.lock-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:10px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.lock-btn:hover{background:var(--accent2);}
.lock-error{font-size:12px;color:var(--high);margin-top:8px;min-height:18px;}

.sidebar{position:fixed;left:0;top:0;bottom:0;width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:30;}
.sidebar-logo{height:52px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;letter-spacing:-0.3px;}
.sidebar-logo span{color:var(--accent);}
.sidebar-nav{padding:10px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:transparent;font-family:'Geist',sans-serif;width:100%;text-align:left;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--text);}
.nav-item .ni-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.nav-item .ni-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sidebar-section{padding:6px 16px 4px;font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.6px;margin-top:6px;}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border);}

/* MAIN */
.main{margin-left:200px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:20;}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.bc-link{cursor:pointer;}.bc-link:hover{color:var(--text);}
.bc-sep{color:var(--text3);}
.bc-cur{color:var(--text);display:flex;align-items:center;gap:6px;}
.screen{display:none;flex:1;}.screen.active{display:block;}

/* BUTTONS */
.btn{font-family:'Geist',sans-serif;font-size:12px;font-weight:500;border-radius:var(--r);cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;padding:7px 13px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:rgba(255,95,95,0.15);color:var(--high);border:1px solid rgba(255,95,95,0.3);}.btn-danger:hover{background:rgba(255,95,95,0.25);}
.btn-icon{padding:5px;background:transparent;color:var(--text3);border:none;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;font-family:'Geist',sans-serif;transition:all .15s;}
.btn-icon:hover{background:var(--bg4);color:var(--text2);}

/* OVERVIEW */
.overview-page{padding:24px;max-width:900px;}
.overview-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .15s;}
.stat-card:hover{border-color:var(--border2);}
.stat-card.active-stat{border-color:var(--accent);background:rgba(124,111,255,0.06);}
.stat-num{font-size:28px;font-weight:600;letter-spacing:-1px;font-family:'Geist Mono',monospace;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'Geist Mono',monospace;}
.stat-card.s-today .stat-num{color:var(--mid);}
.stat-card.s-overdue .stat-num{color:var(--high);}
.stat-card.s-done .stat-num{color:var(--low);}

.ov-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.ov-filter-group{display:flex;gap:4px;}
.pill{font-family:'Geist',sans-serif;font-size:11px;font-weight:500;border-radius:99px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);padding:4px 10px;transition:all .15s;}
.pill:hover{background:var(--bg3);}
.pill.active{background:var(--bg4);color:var(--text);border-color:var(--border2);}
.pill.p-high.active{background:var(--high-bg);color:var(--high);border-color:var(--high);}
.pill.p-mid.active{background:var(--mid-bg);color:var(--mid);border-color:var(--mid);}
.pill.p-low.active{background:var(--low-bg);color:var(--low);border-color:var(--low);}
.pill-sep{width:1px;background:var(--border2);margin:0 4px;align-self:stretch;}

.ov-section{margin-bottom:20px;}
.ov-section-title{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.ov-section-title .col-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);}
.ov-task-list{display:flex;flex-direction:column;gap:4px;}
.ov-task{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.ov-task:hover{border-color:var(--border2);background:var(--bg3);}
.ov-task-title{flex:1;font-size:13px;font-weight:500;color:var(--text);letter-spacing:-.2px;}
.ov-task-desc{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.ov-proj-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-family:'Geist Mono',monospace;white-space:nowrap;border:1px solid var(--border2);color:var(--text3);}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;font-family:'Geist Mono',monospace;white-space:nowrap;}
.b-high{background:var(--high-bg);color:var(--high);}
.b-mid{background:var(--mid-bg);color:var(--mid);}
.b-low{background:var(--low-bg);color:var(--low);}
.ov-deadline{font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;}
.ov-deadline.overdue{color:var(--high);}
.ov-deadline.today{color:#f5a623;font-weight:600;}
.ov-deadline.week{color:#e8d44d;}
.ov-deadline.soon{color:var(--mid);}
.ov-empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;}

/* PROJECTS PAGE */
.page{padding:24px;max-width:960px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:18px;font-weight:600;letter-spacing:-0.4px;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;cursor:pointer;position:relative;transition:all .15s;}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);}
.proj-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:12px;}
.proj-name{font-size:14px;font-weight:500;margin-bottom:5px;letter-spacing:-0.2px;}
.proj-meta{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;}
.proj-del{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .15s;}
.proj-card:hover .proj-del{opacity:1;}
.add-proj-card{background:transparent;border:1px dashed var(--border2);border-radius:var(--rl);padding:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--text3);font-family:'Geist',sans-serif;transition:all .15s;}
.add-proj-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,111,255,0.05);}

/* BOARD */
.board-nav{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.nav-tab{font-family:'Geist',sans-serif;font-size:12px;font-weight:500;background:transparent;border:1px solid transparent;border-radius:var(--r);cursor:pointer;color:var(--text3);padding:6px 12px;transition:all .15s;}
.nav-tab:hover{color:var(--text2);}
.nav-tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text);}
.filter-bar{display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;color:var(--text3);margin-right:2px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.filter-btn{font-family:'Geist',sans-serif;font-size:11px;font-weight:500;border-radius:99px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);padding:4px 10px;transition:all .15s;}
.filter-btn.active{background:var(--bg4);color:var(--text);}
.filter-btn.f-high.active{background:var(--high-bg);color:var(--high);border-color:var(--high);}
.filter-btn.f-mid.active{background:var(--mid-bg);color:var(--mid);border-color:var(--mid);}
.filter-btn.f-low.active{background:var(--low-bg);color:var(--low);border-color:var(--low);}
.board-wrap{padding:16px 20px;overflow-x:auto;}
.board{display:flex;gap:10px;min-height:500px;align-items:flex-start;}
.column{flex:0 0 220px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);display:flex;flex-direction:column;transition:opacity .15s;}
.column.col-dragging{opacity:.35;}
.column.col-drag-over{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.col-header{padding:11px 12px 9px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.col-drag-handle{cursor:grab;color:var(--text3);font-size:12px;padding:2px 3px;border-radius:4px;line-height:1;user-select:none;flex-shrink:0;}
.col-drag-handle:hover{color:var(--text2);background:var(--bg4);}
.col-drag-handle:active{cursor:grabbing;}
.col-title-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
.col-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;width:100%;outline:none;cursor:text;background:transparent;border:none;color:var(--text2);font-family:'Geist Mono',monospace;}
.col-title:focus{color:var(--text);}
.col-count{font-size:10px;background:var(--bg4);border-radius:99px;padding:2px 7px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;}
.col-del-btn{opacity:0;transition:opacity .15s;flex-shrink:0;}
.column:hover .col-del-btn{opacity:1;}
.cards{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:40px;}
.column.card-drag-over{border-color:var(--accent);background:rgba(124,111,255,0.04);}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card.dragging{opacity:.35;}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px;letter-spacing:-.2px;}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:6px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
.deadline-badge{font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;}
.deadline-badge.overdue{color:var(--high);}
.deadline-badge.today{color:#f5a623;font-weight:600;}
.deadline-badge.week{color:#e8d44d;}
.deadline-badge.soon{color:var(--mid);}
.col-footer{padding:7px 8px;border-top:1px solid var(--border);}
.btn-add-card{width:100%;background:none;border:1px dashed transparent;border-radius:var(--r);padding:6px;font-size:11px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Geist',sans-serif;transition:all .15s;}
.btn-add-card:hover{border-color:var(--border2);color:var(--text2);}
.add-col-btn{flex:0 0 auto;background:transparent;border:1px dashed var(--border2);border-radius:var(--rl);padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-family:'Geist',sans-serif;transition:all .15s;white-space:nowrap;align-self:flex-start;}
.add-col-btn:hover{border-color:var(--accent);color:var(--accent);}
.empty-col{text-align:center;padding:20px 10px;color:var(--text3);font-size:11px;line-height:1.6;}

/* CALENDAR */
.cal-wrap{padding:16px 20px;max-width:860px;}
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cal-month{font-size:16px;font-weight:600;letter-spacing:-.3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.cal-dow{background:var(--bg2);padding:8px;text-align:center;font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.cal-day{background:var(--bg2);min-height:88px;padding:7px;}
.cal-day.other-month{background:var(--bg);}
.cal-day.today{background:rgba(124,111,255,0.07);}
.cal-day-num{font-size:12px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:600;}
.cal-task{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-task:hover{opacity:.75;}
.cal-task.p-high{background:var(--high-bg);color:var(--high);}
.cal-task.p-mid{background:var(--mid-bg);color:var(--mid);}
.cal-task.p-low{background:var(--low-bg);color:var(--low);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:22px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.3px;}
.modal label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.modal input,.modal textarea,.modal select{width:100%;margin-bottom:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Geist',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{resize:vertical;min-height:72px;}
.modal select option{background:var(--bg3);}
.modal-btns{display:flex;gap:8px;justify-content:space-between;margin-top:4px;align-items:center;}
.color-row{display:flex;gap:8px;margin-bottom:14px;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot.selected{border-color:#fff;transform:scale(1.15);}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MOBILE ─────────────────────────────────────────────── */
@media(max-width:768px){
  /* Hide desktop sidebar */
  .sidebar{display:none;}
  .main{margin-left:0;padding-bottom:70px;}

  /* Bottom tab bar */
  .mobile-tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--bg2);border-top:1px solid var(--border);z-index:40;safe-area-inset-bottom:env(safe-area-inset-bottom);}
  .mobile-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Geist',sans-serif;font-size:10px;font-weight:500;transition:color .15s;padding-bottom:env(safe-area-inset-bottom);}
  .mobile-tab.active{color:var(--accent);}
  .mobile-tab-icon{font-size:20px;line-height:1;}

  /* Mobile project drawer */
  .mobile-proj-drawer{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);}
  .mobile-proj-drawer.open{display:block;}
  .mobile-proj-panel{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:12px 0 80px;max-height:80vh;overflow-y:auto;}
  .mobile-proj-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
  .mobile-proj-title{font-size:13px;font-weight:500;color:var(--text2);padding:0 16px 8px;text-transform:uppercase;letter-spacing:.5px;font-family:'Geist Mono',monospace;}
  .mobile-proj-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Geist',sans-serif;font-size:15px;color:var(--text);transition:background .15s;}
  .mobile-proj-item:active{background:var(--bg3);}
  .mobile-proj-item .mpd{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .mobile-proj-item .mpm{font-size:11px;color:var(--text3);margin-left:auto;font-family:'Geist Mono',monospace;}
  .mobile-proj-add{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Geist',sans-serif;font-size:15px;color:var(--accent);border-top:1px solid var(--border);}

  /* Topbar mobile */
  .topbar{padding:0 16px;height:48px;}
  .topbar-title{font-size:16px;}
  .breadcrumb{font-size:13px;}
  #topbar-actions{display:none;}

  /* Overview mobile */
  .overview-page{padding:16px;}
  .overview-stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
  .stat-num{font-size:24px;}
  .stat-label{font-size:10px;}
  .stat-card{padding:14px;}
  .ov-filters{gap:6px;margin-bottom:12px;}
  .ov-filter-group{flex-wrap:wrap;gap:4px;}
  .pill{font-size:11px;padding:5px 10px;}
  .pill-sep{display:none;}
  .ov-task{flex-wrap:wrap;gap:8px;padding:12px;}
  .ov-task-title{font-size:14px;width:100%;}
  .ov-task-desc{display:none;}
  .ov-proj-tag{font-size:10px;}

  /* Projects mobile */
  .page{padding:16px;}
  .page-header{margin-bottom:14px;}
  .page-title{font-size:16px;}
  .proj-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .proj-card{padding:14px;}
  .proj-name{font-size:13px;}
  .proj-del{opacity:1;}
  .add-proj-card{padding:14px;font-size:13px;}

  /* Board mobile */
  .board-nav{padding:8px 12px;gap:6px;}
  .nav-tab{font-size:12px;padding:6px 10px;}
  .board-nav > div{gap:6px;}
  .btn{font-size:12px;padding:6px 10px;}
  .filter-bar{padding:8px 12px;gap:5px;overflow-x:auto;flex-wrap:nowrap;}
  .filter-label{display:none;}

<script>
const SB_URL='https://myjsbrroypvagudhhgdq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15anNicnJveXB2YWd1ZGhoZ2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTM3ODgsImV4cCI6MjA5Mzk2OTc4OH0.alpw_L3ufwltG2ixvj3wQlk83-eYGlACxpzTQ8sFARI';
const COLORS=['#7c6fff','#4caf7d','#ff5f5f','#f5a623','#4db8ff','#c084fc'];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

// Global state
let projects=[], allCards=[], allColumns=[];
// Per-project state
let cards=[], columns=[];
let currentProj=null, currentFilter='all', currentView='board';
let calDate=new Date();
let dragCardId=null, dragColId=null;
let modalMode=null, editingId=null, editingProjId=null;
let selectedColor=COLORS[0], targetCol=null;
// Overview filters
let ovFilterPri='all', ovFilterProj='all', ovFilterStatus='all';

async function api(path,method='GET',body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  const t=await r.text();return t?JSON.parse(t):null;
}

async function bootstrap(){
  projects=await api('projects?select=*&order=created_at.asc')||[];
  allCards=await api('cards?select=*&order=created_at.asc')||[];
  allColumns=await api('columns?select=*&order=position.asc')||[];
  renderSidebar();
  renderOverview();
}

function renderSidebar(){
  const list=document.getElementById('sidebar-proj-list');
  list.innerHTML='';
  projects.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='nav-item';btn.id='nav-proj-'+p.id;
    btn.innerHTML=`<span class="ni-dot" style="background:${p.color}"></span>${p.name}`;
    btn.onclick=()=>openProject(p.id,p.name,p.color);
    list.appendChild(btn);
  });
}

function setActiveNav(id){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));

}

function showScreen(id){

}

// ── OVERVIEW ──────────────────────────────────────────────
function showOverview(){
  setActiveNav('nav-overview');
  showScreen('screen-overview');
  document.getElementById('topbar-title').textContent='Обзор';
  document.getElementById('breadcrumb').innerHTML='';
  document.getElementById('topbar-actions').innerHTML='';
  renderOverview();
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderOverview(){
  const today=todayStr();
  const notDoneCards=allCards.filter(c=>{
    const col=allColumns.find(x=>x.id===c.col);
    return col&&col.title!=='Готово';
  });

  // Find "done" column ids
  const doneColIds=allColumns.filter(c=>c.title==='Готово').map(c=>c.id);
  const todayCards=allCards.filter(c=>c.deadline===today&&!doneColIds.includes(c.col));
  const overdueCards=allCards.filter(c=>c.deadline&&c.deadline<today&&!doneColIds.includes(c.col));
  const doneCards=allCards.filter(c=>doneColIds.includes(c.col));
  const totalActive=notDoneCards.length;

  // Stats
  const stats=document.getElementById('ov-stats');
  stats.innerHTML=`
    <div class="stat-card${ovFilterStatus==='active'?' active-stat':''}" onclick="setOvStatus('active')">
      <div class="stat-num">${totalActive}</div>
      <div class="stat-label">Активных</div>
    </div>
    <div class="stat-card s-today${ovFilterStatus==='today'?' active-stat':''}" onclick="setOvStatus('today')">
      <div class="stat-num">${todayCards.length}</div>
      <div class="stat-label">Сегодня</div>
    </div>
    <div class="stat-card s-overdue${ovFilterStatus==='overdue'?' active-stat':''}" onclick="setOvStatus('overdue')">
      <div class="stat-num">${overdueCards.length}</div>
      <div class="stat-label">Просрочено</div>
    </div>
    <div class="stat-card s-done${ovFilterStatus==='done'?' active-stat':''}" onclick="setOvStatus('done')">
      <div class="stat-num">${doneCards.length}</div>
      <div class="stat-label">Готово</div>
    </div>`;

  // Filters
  const filters=document.getElementById('ov-filters');
  const projPills=projects.map(p=>`<button class="pill${ovFilterProj===p.id?' active':''}" onclick="setOvProj('${p.id}')">${p.name}</button>`).join('');
  filters.innerHTML=`
    <div class="ov-filter-group">
      <button class="pill${ovFilterProj==='all'?' active':''}" onclick="setOvProj('all')">Все проекты</button>
      ${projPills}
    </div>
    <div class="pill-sep"></div>
    <div class="ov-filter-group">
      <button class="pill${ovFilterPri==='all'?' active':''}" onclick="setOvPri('all')">Все</button>
      <button class="pill p-high${ovFilterPri==='high'?' active':''}" onclick="setOvPri('high')">Высокий</button>
      <button class="pill p-mid${ovFilterPri==='mid'?' active':''}" onclick="setOvPri('mid')">Средний</button>
      <button class="pill p-low${ovFilterPri==='low'?' active':''}" onclick="setOvPri('low')">Низкий</button>
    </div>`;

  // Filter cards
  let filtered=[...allCards];
  if(ovFilterStatus==='active') filtered=filtered.filter(c=>!doneColIds.includes(c.col));
  else if(ovFilterStatus==='today') filtered=filtered.filter(c=>c.deadline===today&&!doneColIds.includes(c.col));
  else if(ovFilterStatus==='overdue') filtered=filtered.filter(c=>c.deadline&&c.deadline<today&&!doneColIds.includes(c.col));
  else if(ovFilterStatus==='done') filtered=filtered.filter(c=>doneColIds.includes(c.col));
  if(ovFilterProj!=='all') filtered=filtered.filter(c=>c.proj_id===ovFilterProj);
  if(ovFilterPri!=='all') filtered=filtered.filter(c=>c.priority===ovFilterPri);

  // Sort: done by completed_at desc, others by priority
  const priOrder={high:0,mid:1,low:2};
  filtered.sort((a,b)=>{
    const aCol=allColumns.find(x=>x.id===a.col);
    const bCol=allColumns.find(x=>x.id===b.col);
    const aDone=aCol&&aCol.title==='Готово';
    const bDone=bCol&&bCol.title==='Готово';
    if(aDone&&bDone) return new Date(b.completed_at||0)-new Date(a.completed_at||0);
    return (priOrder[a.priority]??1)-(priOrder[b.priority]??1);
  });

  // Group by column title
  const content=document.getElementById('ov-content');
  if(!filtered.length){content.innerHTML='<div class="ov-empty">Нет задач</div>';return;}

  // Group by column
  const groups={};
  filtered.forEach(c=>{
    const col=allColumns.find(x=>x.id===c.col);
    const key=col?col.title:'Без статуса';
    if(!groups[key])groups[key]=[];
    groups[key].push(c);
  });

  content.innerHTML='';
  Object.entries(groups).forEach(([colTitle,colCards])=>{
    const sec=document.createElement('div');
    sec.className='ov-section';
    sec.innerHTML=`<div class="ov-section-title"><span class="col-dot"></span>${colTitle} <span style="color:var(--text3);font-size:10px">${colCards.length}</span></div>
      <div class="ov-task-list">${colCards.map(c=>ovTaskHTML(c)).join('')}</div>`;
    content.appendChild(sec);
  });

  // Click handlers
  content.querySelectorAll('.ov-task').forEach(el=>{
    el.addEventListener('click',()=>openOvCardEdit(el.dataset.id));
  });
}

function ovTaskHTML(c){
  const proj=projects.find(p=>p.id===c.proj_id);
  const bc=c.priority==='high'?'b-high':c.priority==='mid'?'b-mid':'b-low';
  const bl=c.priority==='high'?'Высокий':c.priority==='mid'?'Средний':'Низкий';
  const dc=c.deadline?deadlineClass(c.deadline):'';
  const dlHTML=c.deadline?`<span class="ov-deadline ${dc}">${fmtDate(c.deadline)}</span>`:'';
  const projDot=proj?`<span style="width:6px;height:6px;border-radius:50%;background:${proj.color};display:inline-block;flex-shrink:0"></span>`:'';
  const projName=proj?`<span class="ov-proj-tag" style="border-color:${proj.color}22">${projDot} ${proj.name}</span>`:'';
  return`<div class="ov-task" data-id="${c.id}">
    <div class="ov-task-title">${c.title}</div>
    ${c.description?`<div class="ov-task-desc">${c.description}</div>`:''}
    <span class="badge ${bc}">${bl}</span>
    ${dlHTML}
    ${projName}
  </div>`;
}

function setOvStatus(s){ovFilterStatus=ovFilterStatus===s?'all':s;renderOverview();}
function setOvProj(p){ovFilterProj=p;renderOverview();}
function setOvPri(p){ovFilterPri=p;renderOverview();}

async function openOvCardEdit(cardId){
  const c=allCards.find(x=>x.id===cardId);if(!c)return;
  // Load columns for this project if needed
  const projCols=allColumns.filter(x=>x.proj_id===c.proj_id);
  editingId=cardId;editingProjId=c.proj_id;modalMode='card-ov';targetCol=c.col;
  document.getElementById('modal-title').textContent='Редактировать задачу';
  const colOpts=projCols.map(col=>`<option value="${col.id}"${c.col===col.id?' selected':''}>${col.title}</option>`).join('');
  const projOpts=projects.map(p=>`<option value="${p.id}"${c.proj_id===p.id?' selected':''}>${p.name}</option>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <label>Заголовок</label>
    <input id="inp-ctitle" type="text" value="${c.title}" />
    <label>Описание</label>
    <textarea id="inp-cdesc">${c.description||''}</textarea>
    <label>Приоритет</label>
    <select id="inp-cpri">
      <option value="low"${c.priority==='low'?' selected':''}>Низкий</option>
      <option value="mid"${c.priority==='mid'?' selected':''}>Средний</option>
      <option value="high"${c.priority==='high'?' selected':''}>Высокий</option>
    </select>
    <label>Проект</label>
    <select id="inp-cproj" onchange="refreshColOpts(this.value,'${c.col}')">${projOpts}</select>
    <label>Статус</label>
    <select id="inp-ccol">${colOpts}</select>
    <label>Дедлайн</label>
    <input id="inp-deadline" type="date" value="${c.deadline||''}" />
    <label>Повторение</label>
    <select id="inp-recurring">
      <option value=""${!c.recurring?' selected':''}>Без повторения</option>
      <option value="daily"${c.recurring==='daily'?' selected':''}>Каждый день</option>
      <option value="weekly"${c.recurring==='weekly'?' selected':''}>Каждую неделю</option>
      <option value="monthly"${c.recurring==='monthly'?' selected':''}>Каждый месяц</option>
    </select>`;
  document.getElementById('modal-left-btn').innerHTML=
    `<button class="btn btn-danger" onclick="delCardGlobal('${cardId}')">Удалить</button>`;
  openModal();setTimeout(()=>document.getElementById('inp-ctitle').focus(),60);
}

function refreshColOpts(projId, currentCol){
  const projCols=allColumns.filter(x=>x.proj_id===projId);
  const sel=document.getElementById('inp-ccol');
  sel.innerHTML=projCols.map(col=>`<option value="${col.id}"${col.id===currentCol?' selected':''}>${col.title}</option>`).join('');
}

async function delCardGlobal(id){
  allCards=allCards.filter(c=>c.id!==id);
  if(cards) cards=cards.filter(c=>c.id!==id);
  closeModal();renderOverview();
  await api('cards?id=eq.'+id,'DELETE');
}

// ── PROJECTS LIST ──────────────────────────────────────────
function showProjectsScreen(){
  setActiveNav('nav-projects');
  showScreen('screen-projects');
  document.getElementById('topbar-title').textContent='Проекты';
  document.getElementById('breadcrumb').innerHTML='';
  document.getElementById('topbar-actions').innerHTML='<button class="btn btn-primary" onclick="openProjModal()">+ Новый проект</button>';
  renderProjGrid();
}

function renderProjGrid(){
  const grid=document.getElementById('proj-grid');
  grid.innerHTML='';
  projects.forEach(p=>{
    const projCards=allCards.filter(c=>c.proj_id===p.id);
    const doneColIds=allColumns.filter(c=>c.proj_id===p.id&&c.title==='Готово').map(c=>c.id);
    const done=projCards.filter(c=>doneColIds.includes(c.col)).length;
    const el=document.createElement('div');el.className='proj-card';
    el.innerHTML=`<div class="proj-dot" style="background:${p.color}"></div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-meta">${projCards.length} задач · ${done} готово</div>
      <button class="btn-icon proj-del" onclick="event.stopPropagation();delProject('${p.id}')" title="Удалить">&#x2715;</button>`;
    el.addEventListener('click',()=>openProject(p.id,p.name,p.color));
    grid.appendChild(el);
  });
  const add=document.createElement('button');add.className='add-proj-card';
  add.innerHTML='+ Новый проект';add.onclick=openProjModal;grid.appendChild(add);
}

// ── BOARD ──────────────────────────────────────────────────
async function openProject(projId,name,color){
  currentProj=projId;currentFilter='all';currentView='board';
  setActiveNav('nav-proj-'+projId);
  showScreen('screen-board');
  document.getElementById('topbar-title').textContent='';
  document.getElementById('breadcrumb').innerHTML=
    `<span class="bc-link" onclick="showOverview()">Обзор</span>
     <span class="bc-sep">/</span>
     <span class="bc-cur"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block"></span>${name}</span>`;
  document.getElementById('topbar-actions').innerHTML='';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('tab-board').classList.add('active');
  document.getElementById('tab-calendar').classList.remove('active');
  document.getElementById('view-board').style.display='block';
  document.getElementById('view-calendar').style.display='none';
  document.getElementById('board').innerHTML='<div class="loading"><div class="spinner"></div> Загрузка...</div>';
  cards=allCards.filter(c=>c.proj_id===projId);
  columns=allColumns.filter(c=>c.proj_id===projId).sort((a,b)=>a.position-b.position);
  if(!columns.length){
    await initDefaultColumns(projId);
  }
  renderBoard();
}

async function initDefaultColumns(projId){
  const defs=['Бэклог','На этой неделе','Сегодня','Готово'];
  for(let i=0;i<defs.length;i++){
    const res=await api('columns','POST',{proj_id:projId,title:defs[i],position:i});
    columns.push(res[0]);allColumns.push(res[0]);
  }
}

function switchView(v){
  currentView=v;
  document.getElementById('view-board').style.display=v==='board'?'block':'none';
  document.getElementById('view-calendar').style.display=v==='calendar'?'block':'none';
  document.getElementById('tab-board').classList.toggle('active',v==='board');
  document.getElementById('tab-calendar').classList.toggle('active',v==='calendar');
  if(v==='calendar')renderCalendar();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-filter="'+f+'"]').classList.add('active');
  renderBoard();
}

function renderBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  const filtered=currentFilter==='all'?cards:cards.filter(c=>c.priority===currentFilter);
  columns.forEach(col=>{
    const priOrder={high:0,mid:1,low:2};
    let colCards=filtered.filter(c=>c.col===col.id);
    if(isDoneCol(col.id)) colCards.sort((a,b)=>new Date(b.completed_at||0)-new Date(a.completed_at||0));
    else colCards.sort((a,b)=>(priOrder[a.priority]??1)-(priOrder[b.priority]??1));
    const allCount=cards.filter(c=>c.col===col.id).length;
    const el=document.createElement('div');el.className='column';el.dataset.colId=col.id;
    el.innerHTML=`
      <div class="col-header">
        <span class="col-drag-handle" title="Перетащить">&#8942;&#8942;</span>
        <div class="col-title-wrap">
          <input class="col-title" value="${col.title}"
            onblur="renameCol('${col.id}',this.value)"
            onkeydown="if(event.key==='Enter')this.blur()" />
          <span class="col-count">${colCards.length}${currentFilter!=='all'?'/'+allCount:''}</span>
        </div>
        <button class="btn-icon col-del-btn" onclick="delCol('${col.id}')">&#x2715;</button>
      </div>
      <div class="cards" id="col-${col.id}">
        ${colCards.length===0?'<div class="empty-col">Нет задач</div>':colCards.map(cardHTML).join('')}
      </div>
      <div class="col-footer">
        <button class="btn-add-card" onclick="openCardModal('${col.id}')">+ Добавить</button>
      </div>`;
    el.addEventListener('dragover',e=>{e.preventDefault();
      if(dragCardId)el.classList.add('card-drag-over');
      if(dragColId&&dragColId!==col.id)el.classList.add('col-drag-over');
    });
    el.addEventListener('dragleave',()=>{el.classList.remove('card-drag-over');el.classList.remove('col-drag-over');});
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('card-drag-over');el.classList.remove('col-drag-over');
      if(dragCardId)dropCard(col.id);
      if(dragColId&&dragColId!==col.id)dropColumn(col.id);
    });
    const handle=el.querySelector('.col-drag-handle');
    handle.addEventListener('mousedown',()=>el.setAttribute('draggable','true'));
    el.addEventListener('dragstart',e=>{
      if(el.getAttribute('draggable')!=='true'){e.preventDefault();return;}
      dragColId=col.id;dragCardId=null;setTimeout(()=>el.classList.add('col-dragging'),0);
    });
    el.addEventListener('dragend',()=>{el.setAttribute('draggable','false');el.classList.remove('col-dragging');dragColId=null;});
    board.appendChild(el);
  });
  board.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart',e=>{e.stopPropagation();dragCardId=card.dataset.id;dragColId=null;setTimeout(()=>card.classList.add('dragging'),0);});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragCardId=null;});
    card.addEventListener('click',()=>openEditCardModal(card.dataset.id));
  });
  const addBtn=document.createElement('button');addBtn.className='add-col-btn';
  addBtn.innerHTML='+ Добавить статус';addBtn.onclick=openColModal;board.appendChild(addBtn);
}

function isDoneCol(colId){
  const col=allColumns.find(c=>c.id===colId);
  return col&&col.title==='Готово';
}

function nextDeadline(deadline, recurring){
  if(!deadline||!recurring)return null;
  const d=new Date(deadline);
  if(recurring==='daily') d.setDate(d.getDate()+1);
  else if(recurring==='weekly') d.setDate(d.getDate()+7);
  else if(recurring==='monthly') d.setMonth(d.getMonth()+1);
  return d.toISOString().split('T')[0];
}

async function createRecurringCopy(card){
  if(!card.recurring)return;
  // Find first column (backlog) of this project
  const projCols=allColumns.filter(c=>c.proj_id===card.proj_id).sort((a,b)=>a.position-b.position);
  const firstCol=projCols[0];if(!firstCol)return;
  const newCard={
    proj_id:card.proj_id,
    title:card.title,
    description:card.description,
    priority:card.priority,
    col:firstCol.id,
    recurring:card.recurring,
    deadline:nextDeadline(card.deadline,card.recurring),
    completed_at:null
  };
  const res=await api('cards','POST',newCard);
  if(res&&res[0]){allCards.push(res[0]);if(card.proj_id===currentProj)cards.push(res[0]);}
}

async function dropCard(colId){
  if(!dragCardId)return;
  const card=cards.find(c=>c.id===dragCardId);
  if(card&&card.col!==colId){
    const wasDone=isDoneCol(card.col);
    const nowDone=isDoneCol(colId);
    const patch={col:colId};
    if(nowDone) patch.completed_at=new Date().toISOString();
    else if(wasDone) patch.completed_at=null;
    Object.assign(card,patch);
    const gc=allCards.find(c=>c.id===dragCardId);if(gc)Object.assign(gc,patch);
    renderBoard();
    await api('cards?id=eq.'+dragCardId,'PATCH',patch);
    if(nowDone&&!wasDone&&card.recurring) await createRecurringCopy(card);
    renderBoard();renderOverview();
  }
  dragCardId=null;
}

async function dropColumn(targetColId){
  if(!dragColId||dragColId===targetColId)return;
  const fi=columns.findIndex(c=>c.id===dragColId);
  const ti=columns.findIndex(c=>c.id===targetColId);
  if(fi===-1||ti===-1)return;
  const moved=columns.splice(fi,1)[0];columns.splice(ti,0,moved);
  columns.forEach((c,i)=>c.position=i);
  renderBoard();
  await Promise.all(columns.map((c,i)=>api('columns?id=eq.'+c.id,'PATCH',{position:i})));
  dragColId=null;
}

async function renameCol(colId,newTitle){
  if(!newTitle.trim())return;
  const col=columns.find(c=>c.id===colId);
  if(!col||col.title===newTitle.trim())return;
  col.title=newTitle.trim();
  const gc=allColumns.find(c=>c.id===colId);if(gc)gc.title=col.title;
  await api('columns?id=eq.'+colId,'PATCH',{title:col.title});
}

async function delCol(colId){
  if(!confirm('Удалить статус? Задачи в нём тоже удалятся.'))return;
  columns=columns.filter(c=>c.id!==colId);
  cards=cards.filter(c=>c.col!==colId);
  allColumns=allColumns.filter(c=>c.id!==colId);
  allCards=allCards.filter(c=>c.col!==colId);
  renderBoard();await api('columns?id=eq.'+colId,'DELETE');
}

async function delCard(id){
  cards=cards.filter(c=>c.id!==id);
  allCards=allCards.filter(c=>c.id!==id);
  renderBoard();closeModal();await api('cards?id=eq.'+id,'DELETE');
}

async function delProject(id){
  if(!confirm('Удалить проект и все задачи?'))return;
  projects=projects.filter(p=>p.id!==id);
  allCards=allCards.filter(c=>c.proj_id!==id);
  allColumns=allColumns.filter(c=>c.proj_id!==id);
  renderSidebar();renderProjGrid();
  await api('projects?id=eq.'+id,'DELETE');
}

function deadlineClass(dl){
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.floor((new Date(dl)-today)/864e5);
  if(diff<0)return'overdue';
  if(diff===0)return'today';
  if(diff<=7)return'week';
  return'';
}
function fmtDate(dl){
  if(!dl)return'';
  const[y,m,d]=dl.split('-');
  return d+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][parseInt(m)-1];
}
function cardHTML(c){
  const bc=c.priority==='high'?'b-high':c.priority==='mid'?'b-mid':'b-low';
  const bl=c.priority==='high'?'Высокий':c.priority==='mid'?'Средний':'Низкий';
  const dc=c.deadline?deadlineClass(c.deadline):'';
  const dlHTML=c.deadline?`<span class="deadline-badge ${dc}">${fmtDate(c.deadline)}</span>`:'';
  const recIcon=c.recurring?`<span title="${c.recurring==='daily'?'Каждый день':c.recurring==='weekly'?'Каждую неделю':'Каждый месяц'}" style="font-size:11px;color:var(--text3)">&#x21bb;</span>`:'';
  return`<div class="card" draggable="true" data-id="${c.id}">
    <div class="card-title">${c.title}</div>
    ${c.description?`<div class="card-desc">${c.description}</div>`:''}
    <div class="card-footer"><span class="badge ${bc}">${bl}</span>${dlHTML}${recIcon}</div>
  </div>`;
}

// ── MODALS ─────────────────────────────────────────────────
function openProjModal(){
  modalMode='project';selectedColor=COLORS[0];
  document.getElementById('modal-title').textContent='Новый проект';
  document.getElementById('modal-body').innerHTML=`
    <label>Название</label>
    <input id="inp-pname" type="text" placeholder="Название проекта" />
    <label>Цвет</label>
    <div class="color-row">${COLORS.map((c,i)=>`<div class="color-dot${i===0?' selected':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`).join('')}</div>`;
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-pname').focus(),60);
}

function openColModal(){
  modalMode='col';
  document.getElementById('modal-title').textContent='Новый статус';
  document.getElementById('modal-body').innerHTML=`
    <label>Название статуса</label>
    <input id="inp-colname" type="text" placeholder="Например: На проверке" />`;
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-colname').focus(),60);
}

function openCardModal(colId){
  modalMode='card';editingId=null;targetCol=colId||(columns[0]?.id);
  document.getElementById('modal-title').textContent='Новая задача';
  document.getElementById('modal-body').innerHTML=cardFormHTML(null,columns);
  document.getElementById('modal-left-btn').innerHTML='';
  openModal();setTimeout(()=>document.getElementById('inp-ctitle').focus(),60);
}

function openEditCardModal(cardId){
  const c=cards.find(x=>x.id===cardId);if(!c)return;
  modalMode='card';editingId=cardId;targetCol=c.col;
  document.getElementById('modal-title').textContent='Редактировать задачу';
  document.getElementById('modal-body').innerHTML=cardFormHTML(c,columns);
  document.getElementById('modal-left-btn').innerHTML=
    `<button class="btn btn-danger" onclick="delCard('${cardId}')">Удалить</button>`;
  openModal();setTimeout(()=>document.getElementById('inp-ctitle').focus(),60);
}

function cardFormHTML(c,cols){
  const colOpts=cols.map(col=>`<option value="${col.id}"${(c?c.col:targetCol)===col.id?' selected':''}>${col.title}</option>`).join('');
  return`
    <label>Заголовок</label>
    <input id="inp-ctitle" type="text" placeholder="Что нужно сделать?" value="${c?c.title:''}" />
    <label>Описание</label>
    <textarea id="inp-cdesc" placeholder="Необязательно...">${c?c.description||'':''}</textarea>
    <label>Приоритет</label>
    <select id="inp-cpri">
      <option value="low"${c?.priority==='low'?' selected':''}>Низкий</option>
      <option value="mid"${(!c||c.priority==='mid')?' selected':''}>Средний</option>
      <option value="high"${c?.priority==='high'?' selected':''}>Высокий</option>
    </select>
    <label>Статус</label>
    <select id="inp-ccol">${colOpts}</select>
    <label>Дедлайн</label>
    <input id="inp-deadline" type="date" value="${c?.deadline||''}" />
    <label>Повторение</label>
    <select id="inp-recurring">
      <option value=""${!c?.recurring?' selected':''}>Без повторения</option>
      <option value="daily"${c?.recurring==='daily'?' selected':''}>Каждый день</option>
      <option value="weekly"${c?.recurring==='weekly'?' selected':''}>Каждую неделю</option>
      <option value="monthly"${c?.recurring==='monthly'?' selected':''}>Каждый месяц</option>
    </select>`;
}

function selColor(c,el){
  selectedColor=c;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
}
function openModal(){document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

async function saveModal(){
  if(modalMode==='project'){
    const name=document.getElementById('inp-pname').value.trim();if(!name)return;
    const res=await api('projects','POST',{name,color:selectedColor});
    projects.push(res[0]);renderSidebar();renderProjGrid();closeModal();
  } else if(modalMode==='col'){
    const title=document.getElementById('inp-colname').value.trim();if(!title)return;
    const res=await api('columns','POST',{proj_id:currentProj,title,position:columns.length});
    columns.push(res[0]);allColumns.push(res[0]);renderBoard();closeModal();
  } else if(modalMode==='card'||modalMode==='card-ov'){
    const title=document.getElementById('inp-ctitle').value.trim();if(!title)return;
    const projId=modalMode==='card-ov'?(document.getElementById('inp-cproj')?.value||editingProjId):currentProj;
    const newCol=document.getElementById('inp-ccol').value;
    const prevCard=editingId?allCards.find(c=>c.id===editingId):null;
    const body={proj_id:projId,title,
      description:document.getElementById('inp-cdesc').value.trim(),
      priority:document.getElementById('inp-cpri').value,
      col:newCol,
      deadline:document.getElementById('inp-deadline').value||null,
      recurring:document.getElementById('inp-recurring').value||null};
    if(isDoneCol(newCol)&&(!prevCard||!isDoneCol(prevCard.col))) body.completed_at=new Date().toISOString();
    else if(!isDoneCol(newCol)&&prevCard&&isDoneCol(prevCard.col)) body.completed_at=null;
    if(editingId){
      const prevCard=allCards.find(c=>c.id===editingId);
      const wasInDone=prevCard&&isDoneCol(prevCard.col);
      await api('cards?id=eq.'+editingId,'PATCH',body);
      [allCards,cards].forEach(arr=>{const i=arr.findIndex(c=>c.id===editingId);if(i>-1)arr[i]={...arr[i],...body};});
      if(!wasInDone&&isDoneCol(body.col)&&body.recurring){
        await createRecurringCopy({...body,id:editingId});
      }
    } else {
      const res=await api('cards','POST',body);
      allCards.push(res[0]);cards.push(res[0]);
    }
    if(modalMode==='card')renderBoard();
    renderOverview();
    if(currentView==='calendar')renderCalendar();
    closeModal();
  }
}

// ── CALENDAR ───────────────────────────────────────────────
function calNav(dir){calDate.setMonth(calDate.getMonth()+dir);renderCalendar();}
function renderCalendar(){
  const year=calDate.getFullYear(),month=calDate.getMonth();
  document.getElementById('cal-month').textContent=MONTHS[month]+' '+year;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  DAYS.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(year,month,1);
  let startDow=first.getDay()-1;if(startDow<0)startDow=6;
  const dim=new Date(year,month+1,0).getDate();
  const dip=new Date(year,month,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const rows=Math.ceil((startDow+dim)/7)*7;
  for(let i=0;i<rows;i++){
    const el=document.createElement('div');el.className='cal-day';
    let dn,isCur=true;
    if(i<startDow){dn=dip-startDow+i+1;isCur=false;}
    else if(i>=startDow+dim){dn=i-startDow-dim+1;isCur=false;}
    else dn=i-startDow+1;
    if(!isCur)el.classList.add('other-month');
    const td=new Date(year,isCur?month:(i<startDow?month-1:month+1),dn);
    if(td.getTime()===today.getTime())el.classList.add('today');
    el.innerHTML=`<div class="cal-day-num">${dn}</div>`;
    if(isCur){
      const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
      cards.filter(c=>c.deadline===ds).forEach(c=>{
        const t=document.createElement('div');t.className='cal-task p-'+c.priority;
        t.textContent=c.title;t.onclick=()=>openEditCardModal(c.id);el.appendChild(t);
      });
    }
    grid.appendChild(el);
  }
}

document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── MOBILE NAV ─────────────────────────────────────────────
function isMobile(){return window.innerWidth<=768;}

function setMobileTab(id){
  document.querySelectorAll('.mobile-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
}

function mobileShowProjects(){
  if(!isMobile()){showProjectsScreen();return;}
  // Show drawer with project list
  const list=document.getElementById('mobile-proj-list');
  list.innerHTML='';
  projects.forEach(p=>{
    const projCards=allCards.filter(c=>c.proj_id===p.id);
    const doneColIds=allColumns.filter(c=>c.proj_id===p.id&&c.title==='Готово').map(c=>c.id);
    const done=projCards.filter(c=>doneColIds.includes(c.col)).length;
    const btn=document.createElement('button');
    btn.className='mobile-proj-item';
    btn.innerHTML=`<span class="mpd" style="background:${p.color}"></span>${p.name}<span class="mpm">${projCards.length} / ${done} ✓</span>`;
    btn.onclick=()=>{closeProjDrawer();openProject(p.id,p.name,p.color);};
    list.appendChild(btn);
  });
  document.getElementById('mobile-proj-drawer').classList.add('open');
}

function closeProjDrawer(){
  document.getElementById('mobile-proj-drawer').classList.remove('open');
}

function mobileShowBoard(){
  // Already on board, just scroll to top
  window.scrollTo(0,0);
}

function onFabClick(){
  const active=document.querySelector('.screen.active');
  if(!active)return;
  const id=active.id;
  if(id==='screen-overview') openProjModal();
  else if(id==='screen-projects') openProjModal();
  else if(id==='screen-board') openCardModal(columns[0]?.id||null);
}
