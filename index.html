<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои задачи</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #171717;
  --bg3: #1f1f1f;
  --bg4: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #7c6fff;
  --accent2: #5b52cc;
  --high: #ff5f5f;
  --high-bg: rgba(255,95,95,0.12);
  --mid: #f5a623;
  --mid-bg: rgba(245,166,35,0.12);
  --low: #4caf7d;
  --low-bg: rgba(76,175,125,0.12);
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* TOPBAR */
.topbar { height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
.logo { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.breadcrumb .sep { color: var(--text3); }
.breadcrumb .current { color: var(--text); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* BUTTONS */
.btn { font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-icon { padding: 6px; background: transparent; color: var(--text3); border: none; border-radius: 6px; cursor: pointer; font-size: 15px; line-height: 1; transition: all 0.15s; }
.btn-icon:hover { background: var(--bg4); color: var(--text2); }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* PROJECTS SCREEN */
.page { padding: 24px 20px; max-width: 900px; margin: 0 auto; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }
.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.proj-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; position: relative; transition: all 0.15s; }
.proj-card:hover { border-color: var(--border2); background: var(--bg3); }
.proj-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-bottom: 12px; }
.proj-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; letter-spacing: -0.2px; }
.proj-meta { font-size: 11px; color: var(--text3); font-family: 'Geist Mono', monospace; }
.proj-del { position: absolute; top: 10px; right: 10px; opacity: 0; transition: opacity 0.15s; }
.proj-card:hover .proj-del { opacity: 1; }
.add-proj-card { background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--text3); font-family: 'Geist', sans-serif; transition: all 0.15s; }
.add-proj-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,255,0.05); }

/* BOARD SCREEN */
.board-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.filter-bar { display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid var(--border); align-items: center; }
.filter-label { font-size: 11px; color: var(--text3); margin-right: 4px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-btn { font-family: 'Geist', sans-serif; font-size: 11px; font-weight: 500; border-radius: 99px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); padding: 4px 10px; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--border2); background: var(--bg3); }
.filter-btn.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.filter-btn.f-high.active { background: var(--high-bg); color: var(--high); border-color: var(--high); }
.filter-btn.f-mid.active { background: var(--mid-bg); color: var(--mid); border-color: var(--mid); }
.filter-btn.f-low.active { background: var(--low-bg); color: var(--low); border-color: var(--low); }

.board-wrap { padding: 16px 20px; overflow-x: auto; }
.board { display: flex; gap: 10px; min-height: 500px; }

/* COLUMNS */
.column { flex: 0 0 220px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; }
.col-header { padding: 12px 13px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.col-title { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; font-family: 'Geist Mono', monospace; }
.col-count { font-size: 10px; background: var(--bg4); border-radius: 99px; padding: 2px 7px; color: var(--text3); font-family: 'Geist Mono', monospace; }
.cards { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
.column.drag-over { border-color: var(--accent); background: rgba(124,111,255,0.04); }

/* CARDS */
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 12px; cursor: grab; transition: border-color 0.15s; }
.card:hover { border-color: var(--border2); }
.card.dragging { opacity: 0.35; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 3px; letter-spacing: -0.2px; }
.card-desc { font-size: 11px; color: var(--text3); line-height: 1.5; margin-bottom: 7px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; font-family: 'Geist Mono', monospace; }
.b-high { background: var(--high-bg); color: var(--high); }
.b-mid { background: var(--mid-bg); color: var(--mid); }
.b-low { background: var(--low-bg); color: var(--low); }

.col-footer { padding: 7px 8px; border-top: 1px solid var(--border); }
.btn-add-card { width: 100%; background: none; border: 1px dashed transparent; border-radius: var(--radius); padding: 6px; font-size: 11px; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; font-family: 'Geist', sans-serif; transition: all 0.15s; }
.btn-add-card:hover { border-color: var(--border2); color: var(--text2); }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.modal-bg.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 22px; width: 320px; }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.3px; }
.modal label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.4px; }
.modal input, .modal textarea, .modal select {
  width: 100%; margin-bottom: 12px; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-family: 'Geist', sans-serif;
  font-size: 13px; padding: 8px 10px; outline: none; transition: border-color 0.15s;
}
.modal input:focus, .modal textarea:focus, .modal select { border-color: var(--accent); }
.modal textarea { resize: vertical; min-height: 72px; }
.modal select option { background: var(--bg3); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.color-row { display: flex; gap: 8px; margin-bottom: 14px; }
.color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-dot.selected { border-color: #fff; transform: scale(1.15); }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text3); font-size: 13px; gap: 8px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty-col { text-align: center; padding: 20px 10px; color: var(--text3); font-size: 11px; line-height: 1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">tasks<span>.</span></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div id="screen-projects" class="screen active">
  <div class="page">
    <div class="page-header">
      <div class="page-title">Проекты</div>
      <button class="btn btn-primary" onclick="openProjModal()">+ Новый проект</button>
    </div>
    <div id="proj-grid" class="proj-grid">
      <div class="loading"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>
</div>

<div id="screen-board" class="screen">
  <div class="filter-bar">
    <span class="filter-label">Приоритет</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
    <button class="filter-btn f-high" data-filter="high" onclick="setFilter('high')">Высокий</button>
    <button class="filter-btn f-mid" data-filter="mid" onclick="setFilter('mid')">Средний</button>
    <button class="filter-btn f-low" data-filter="low" onclick="setFilter('low')">Низкий</button>
    <div style="margin-left:auto;">
      <button class="btn btn-primary" onclick="openCardModal(null)">+ Задача</button>
    </div>
  </div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://myjsbrroypvagudhhgdq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15anNicnJveXB2YWd1ZGhoZ2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTM3ODgsImV4cCI6MjA5Mzk2OTc4OH0.alpw_L3ufwltG2ixvj3wQlk83-eYGlACxpzTQ8sFARI';

const COLS = [
  { id: 'backlog', label: 'Бэклог' },
  { id: 'inprogress', label: 'В работе' },
  { id: 'review', label: 'Ревью' },
  { id: 'done', label: 'Готово' }
];
const COLORS = ['#7c6fff','#4caf7d','#ff5f5f','#f5a623','#4db8ff','#c084fc'];

let currentProj = null;
let currentFilter = 'all';
let dragId = null;
let modalMode = null;
let selectedColor = COLORS[0];
let targetCol = 'backlog';
let projects = [];
let cards = [];

async function api(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function loadProjects() {
  projects = await api('projects?select=*&order=created_at.asc');
  renderProjects();
}

async function loadCards() {
  cards = await api('cards?select=*&proj_id=eq.' + currentProj + '&order=created_at.asc');
  renderBoard();
}

function renderProjects() {
  const grid = document.getElementById('proj-grid');
  grid.innerHTML = '';
  document.getElementById('breadcrumb').innerHTML = '';
  document.getElementById('topbar-right').innerHTML = '';

  projects.forEach(p => {
    const allCards = cards.filter ? [] : [];
    const el = document.createElement('div');
    el.className = 'proj-card';
    el.innerHTML = `
      <div class="proj-dot" style="background:${p.color}"></div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-meta" id="pmeta-${p.id}">загрузка...</div>
      <button class="btn-icon proj-del" onclick="event.stopPropagation();delProject('${p.id}')" title="Удалить">✕</button>`;
    el.addEventListener('click', () => openProject(p.id, p.name, p.color));
    grid.appendChild(el);
    loadProjectMeta(p.id);
  });

  const add = document.createElement('button');
  add.className = 'add-proj-card';
  add.innerHTML = '+ Новый проект';
  add.onclick = openProjModal;
  grid.appendChild(add);
}

async function loadProjectMeta(projId) {
  try {
    const c = await api('cards?select=id,col&proj_id=eq.' + projId);
    const done = c.filter(x => x.col === 'done').length;
    const el = document.getElementById('pmeta-' + projId);
    if (el) el.textContent = c.length + ' задач · ' + done + ' готово';
  } catch(e) {}
}

async function openProject(projId, projName, projColor) {
  currentProj = projId;
  currentFilter = 'all';
  document.getElementById('screen-projects').classList.remove('active');
  document.getElementById('screen-board').classList.add('active');
  document.getElementById('breadcrumb').innerHTML = `
    <span style="cursor:pointer;color:var(--text2)" onclick="showProjects()">Проекты</span>
    <span class="sep">/</span>
    <span class="current" style="display:flex;align-items:center;gap:6px">
      <span style="width:7px;height:7px;border-radius:50%;background:${projColor};display:inline-block"></span>
      ${projName}
    </span>`;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  document.getElementById('board').innerHTML = '<div class="loading"><div class="spinner"></div> Загрузка задач...</div>';
  await loadCards();
}

function showProjects() {
  currentProj = null;
  document.getElementById('screen-board').classList.remove('active');
  document.getElementById('screen-projects').classList.add('active');
  loadProjects();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="' + f + '"]').classList.add('active');
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const filtered = currentFilter === 'all' ? cards : cards.filter(c => c.priority === currentFilter);

  COLS.forEach(col => {
    const colCards = filtered.filter(c => c.col === col.id);
    const allColCards = cards.filter(c => c.col === col.id);
    const el = document.createElement('div');
    el.className = 'column';
    el.dataset.col = col.id;
    el.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-count">${colCards.length}${currentFilter !== 'all' ? '/' + allColCards.length : ''}</span>
      </div>
      <div class="cards" id="col-${col.id}">
        ${colCards.length === 0 ? '<div class="empty-col">Нет задач</div>' : colCards.map(cardHTML).join('')}
      </div>
      <div class="col-footer">
        <button class="btn-add-card" onclick="openCardModal('${col.id}')">+ Добавить</button>
      </div>`;
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); dropCard(col.id); });
    board.appendChild(el);
  });

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', () => { dragId = card.dataset.id; card.classList.add('dragging'); });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });
}

function cardHTML(c) {
  const bc = c.priority === 'high' ? 'b-high' : c.priority === 'mid' ? 'b-mid' : 'b-low';
  const bl = c.priority === 'high' ? 'Высокий' : c.priority === 'mid' ? 'Средний' : 'Низкий';
  return `<div class="card" draggable="true" data-id="${c.id}">
    <div class="card-title">${c.title}</div>
    ${c.description ? `<div class="card-desc">${c.description}</div>` : ''}
    <div class="card-footer">
      <span class="badge ${bc}">${bl}</span>
      <button class="btn-icon" onclick="delCard('${c.id}')" title="Удалить" style="font-size:12px">✕</button>
    </div>
  </div>`;
}

async function dropCard(colId) {
  if (!dragId) return;
  const card = cards.find(c => c.id === dragId);
  if (card && card.col !== colId) {
    card.col = colId;
    renderBoard();
    await api('cards?id=eq.' + dragId, 'PATCH', { col: colId });
  }
  dragId = null;
}

async function delCard(id) {
  if (!confirm('Удалить задачу?')) return;
  cards = cards.filter(c => c.id !== id);
  renderBoard();
  await api('cards?id=eq.' + id, 'DELETE');
}

async function delProject(id) {
  if (!confirm('Удалить проект и все задачи?')) return;
  projects = projects.filter(p => p.id !== id);
  renderProjects();
  await api('projects?id=eq.' + id, 'DELETE');
}

function openProjModal() {
  modalMode = 'project';
  selectedColor = COLORS[0];
  document.getElementById('modal-title').textContent = 'Новый проект';
  document.getElementById('modal-body').innerHTML = `
    <label>Название</label>
    <input id="inp-pname" type="text" placeholder="Название проекта" />
    <label>Цвет</label>
    <div class="color-row">${COLORS.map((c, i) => `<div class="color-dot${i === 0 ? ' selected' : ''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div>`;
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('inp-pname').focus(), 50);
}

function openCardModal(colId) {
  modalMode = 'card';
  targetCol = colId || 'backlog';
  document.getElementById('modal-title').textContent = 'Новая задача';
  document.getElementById('modal-body').innerHTML = `
    <label>Заголовок</label>
    <input id="inp-ctitle" type="text" placeholder="Что нужно сделать?" />
    <label>Описание</label>
    <textarea id="inp-cdesc" placeholder="Необязательно..."></textarea>
    <label>Приоритет</label>
    <select id="inp-cpri">
      <option value="low">Низкий</option>
      <option value="mid" selected>Средний</option>
      <option value="high">Высокий</option>
    </select>
    <label>Колонка</label>
    <select id="inp-ccol">${COLS.map(c => `<option value="${c.id}"${c.id === targetCol ? ' selected' : ''}>${c.label}</option>`).join('')}</select>`;
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('inp-ctitle').focus(), 50);
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

async function saveModal() {
  if (modalMode === 'project') {
    const name = document.getElementById('inp-pname').value.trim();
    if (!name) return;
    const res = await api('projects', 'POST', { name, color: selectedColor });
    projects.push(res[0]);
    renderProjects();
    closeModal();
  } else {
    const title = document.getElementById('inp-ctitle').value.trim();
    if (!title) return;
    const body = {
      proj_id: currentProj,
      title,
      description: document.getElementById('inp-cdesc').value.trim(),
      priority: document.getElementById('inp-cpri').value,
      col: document.getElementById('inp-ccol').value
    };
    const res = await api('cards', 'POST', body);
    cards.push(res[0]);
    renderBoard();
    closeModal();
  }
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadProjects();
</script>
</body>
</html>
